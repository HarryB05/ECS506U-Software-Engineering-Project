<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Government ID - Pet Minder Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .id-card {
            width: 400px;
            height: 250px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .id-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></svg>');
            opacity: 0.1;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .flag {
            width: 40px;
            height: 25px;
            background: #dc2626;
            border-radius: 3px;
            position: relative;
        }
        .flag::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 20px solid #dc2626;
            border-top: 12.5px solid transparent;
            border-bottom: 12.5px solid transparent;
        }
        .gov-text {
            font-size: 12px;
            opacity: 0.9;
        }
        .photo-area {
            display: flex;
            gap: 20px;
        }
        .photo {
            width: 80px;
            height: 100px;
            background: #e5e7eb;
            border-radius: 5px;
            border: 2px solid white;
        }
        .info {
            flex: 1;
        }
        .info h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        .info p {
            margin: 5px 0;
            font-size: 14px;
        }
        .barcode {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 40px;
            background: #000;
            opacity: 0.8;
        }
        .hologram {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            border-radius: 50%;
            opacity: 0.8;
        }
        .download-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .download-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #1f2937;">Mock Government ID Generator</h1>
    <p style="text-align: center; color: #6b7280; margin-bottom: 30px;">
        Generate a mock ID for testing Pet Minder verification. This will be accepted by the AI verification system.
    </p>

    <div class="id-card">
        <div class="header">
            <div class="flag"></div>
            <div class="gov-text">GOVERNMENT OF<br>UNITED KINGDOM</div>
        </div>

        <div class="photo-area">
            <div class="photo"></div>
            <div class="info">
                <h2>JOHN DOE</h2>
                <p><strong>ID Number:</strong> UK123456789</p>
                <p><strong>DOB:</strong> 01/01/1990</p>
                <p><strong>Issue Date:</strong> 01/01/2024</p>
                <p><strong>Expiry:</strong> 01/01/2030</p>
                <p><strong>Address:</strong> 123 Test Street, London</p>
            </div>
        </div>

        <div class="barcode"></div>
        <div class="hologram"></div>
    </div>

    <button class="download-btn" onclick="generateMockId()">Generate New Mock ID</button>
    <button class="download-btn" onclick="downloadID()">Download as PNG for Testing</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        function randomDigits(length) {
            return Array.from({ length }, () => Math.floor(Math.random() * 10)).join('');
        }

        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function generateMockId() {
            const names = [
                "JOHN DOE", "JANE SMITH", "ALEX TAYLOR", "EMMA BROWN", "SAM WILSON",
                "LEWIS CLARKE", "OLIVIA JONES", "NOAH WALKER"
            ];
            const streets = [
                "Test Street", "Minder Road", "Paw Lane", "Park Avenue", "Bridge Close"
            ];
            const cities = ["London", "Manchester", "Birmingham", "Leeds", "Bristol"];

            const fullName = names[Math.floor(Math.random() * names.length)];
            const idNumber = `UK${randomDigits(9)}`;
            const birthYear = 1980 + Math.floor(Math.random() * 23);
            const dob = new Date(birthYear, Math.floor(Math.random() * 12), 1 + Math.floor(Math.random() * 28));
            const issueDate = new Date(2022 + Math.floor(Math.random() * 4), Math.floor(Math.random() * 12), 1 + Math.floor(Math.random() * 28));
            const expiryDate = new Date(issueDate);
            expiryDate.setFullYear(issueDate.getFullYear() + 6);
            const address = `${1 + Math.floor(Math.random() * 300)} ${streets[Math.floor(Math.random() * streets.length)]}, ${cities[Math.floor(Math.random() * cities.length)]}`;

            document.querySelector('.info h2').textContent = fullName;
            document.querySelector('.info p:nth-of-type(1)').innerHTML = `<strong>ID Number:</strong> ${idNumber}`;
            document.querySelector('.info p:nth-of-type(2)').innerHTML = `<strong>DOB:</strong> ${formatDate(dob)}`;
            document.querySelector('.info p:nth-of-type(3)').innerHTML = `<strong>Issue Date:</strong> ${formatDate(issueDate)}`;
            document.querySelector('.info p:nth-of-type(4)').innerHTML = `<strong>Expiry:</strong> ${formatDate(expiryDate)}`;
            document.querySelector('.info p:nth-of-type(5)').innerHTML = `<strong>Address:</strong> ${address}`;
        }

        async function downloadID() {
            const idCard = document.querySelector('.id-card');
            if (!window.html2canvas) {
                alert("Could not load image renderer. Check internet connection and refresh.");
                return;
            }

            try {
                const canvas = await window.html2canvas(idCard, {
                    backgroundColor: '#f5f5f5',
                    scale: 2,
                    width: 400,
                    height: 250
                });

                canvas.toBlob(function(blob) {
                    if (!blob) {
                        alert("Could not generate image blob.");
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'mock-government-id.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            } catch (err) {
                console.error(err);
                alert("Failed to export image. Please try again.");
            }
        }

        // Generate one immediately when page loads
        generateMockId();
    </script>
</body>
</html>
